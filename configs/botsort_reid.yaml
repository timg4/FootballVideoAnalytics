# BoT-SORT für die bewegte Veo-Follow-Cam mit Appearance-ReID.
# Basiert auf Ultralytics botsort.yaml; bewusst als Projektdatei versioniert.
tracker_type: botsort
track_high_thresh: 0.25
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 150       # 5 s bei 30 fps; kurze Kamera-Abwesenheiten überbrücken
match_thresh: 0.8
fuse_score: True

gmc_method: sparseOptFlow

proximity_thresh: 0.5
# Achtung: appearance_thresh ist in Ultralytics eine DISTANZ-Schwelle
# (halbierte Kosinus-Distanz, Standard 0.25) — NICHT Similarity. 0.85 würde
# das Appearance-Gate praktisch abschalten und ID-Switches begünstigen.
appearance_thresh: 0.3
with_reid: True
model: auto
